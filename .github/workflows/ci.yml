name: CI
on:
  - pull_request

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run mypy .
      - run: uv run pytest -v
      - name: ShellCheck
        run: shellcheck debian/build_deb.sh debian/postinst debian/prerm debian/postrm
      - name: Install zizmor
        run: |
          curl -sSL https://github.com/zizmorcore/zizmor/releases/download/v1.28.0/zizmor-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin zizmor
      - name: zizmor
        run: zizmor --offline .github/workflows/
