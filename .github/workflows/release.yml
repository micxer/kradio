name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        # zizmor: ignore[artipacked] -- persist-credentials required: PSR pushes via git credential helper
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          python-version: "3.11"

      - run: uv sync --group dev

      - name: Install fpm
        run: sudo gem install fpm

      - name: Run semantic release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: uv run semantic-release version --push --changelog --vcs-release

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        if: hashFiles('dist/*.whl') != ''
        with:
          subject-path: 'dist/*.whl,dist/*.deb'
