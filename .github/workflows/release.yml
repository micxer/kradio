name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        # zizmor: ignore[artipacked] -- persist-credentials required: PSR pushes via git credential helper
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.11"

      - run: uv sync --group dev

      - name: Install fpm
        run: sudo gem install fpm

      - name: Run semantic release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: uv run semantic-release version --push --changelog --vcs-release

      - name: Publish release artifacts
        if: hashFiles('dist/*.whl') != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: uv run semantic-release publish

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        if: hashFiles('dist/*.whl') != ''
        with:
          subject-path: 'dist/*.whl,dist/*.deb'
