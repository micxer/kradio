name: Code Quality
on:
  - pull_request

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run mypy .
      - run: uv run pytest -v
